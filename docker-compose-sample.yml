services:
  postgresql:
    image: postgres:16-alpine
    container_name: cumulus3-pgdb
    restart: always

    environment:
      - POSTGRES_DB=${POSTGRES_DB:-cumulus3}
      - POSTGRES_USER=${POSTGRES_USER:-cumulus3_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-cumulus3_password}

    ports:
      - "${POSTGRES_PORT:-5432}:5432"

    volumes:
      - cumulus3-postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cumulus3_user} -d ${POSTGRES_DB:-cumulus3}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - cumulus3-network

  cumulus3:
    build:
      context: .
      dockerfile: Dockerfile
    image: cumulus3:latest
    container_name: cumulus3
    restart: always

    ports:
      - "${SERVER_PORT:-8800}:8800"

    env_file:
      - .env

    environment:
      # Logování - přepíše hodnoty z .env pokud jsou nastaveny
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - LOG_COLOR=false

    volumes:
      # Persistentní úložiště pro databázi a data
      - cumulus3-data:/app/data

    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4G
        reservations:
          cpus: "1"
          memory: 1G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
        compress: "true"

    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8800/health",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s

    networks:
      - cumulus3-network

    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp

volumes:
  cumulus3-data:
    driver: local
    driver_opts:
      type: none
      device: /mnt/nfs/cumulus3
      o: bind

  cumulus3-postgres-data:
    driver: local
    driver_opts:
      type: none
      device: /mnt/nfs/cumulus3/pg_db
      o: bind

networks:
  cumulus3-network:
    driver: bridge
